<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arena E-Sports - Login</title>
    <style>
        body {
            background-color: #0b0b0b;
            color: #ffffff;
            font-family: 'Segoe UI', Roboto, sans-serif;
            text-align: center;
            margin: 0;
            padding: 20px;
        }
        
        /* LOGIN SCREEN STYLE - Shuru me chhupa rahega */
        #login-screen {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 80vh;
        }
        .login-box {
            background-color: #161616;
            border: 2px solid #ff2a2a;
            border-radius: 16px;
            padding: 30px;
            width: 90%;
            max-width: 360px;
            box-shadow: 0px 0px 20px rgba(255, 0, 0, 0.3);
        }
        .login-box input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            background-color: #222;
            border: 1px solid #444;
            border-radius: 6px;
            color: white;
            font-size: 16px;
            box-sizing: border-box;
        }
        .login-box input:focus {
            border-color: #ff2a2a;
            outline: none;
        }

        /* MAIN WEBSITE STYLE - Shuru me chhupa rahega */
        #main-site {
            display: none;
        }

        .header {
            padding: 20px;
            border-bottom: 2px solid #ff0000;
        }
        .logo-box {
            width: 110px;
            height: 110px;
            border: 3px solid #ff2a2a;
            border-radius: 50%;
            margin: 10px auto;
            box-shadow: 0px 0px 18px #ff0000;
            overflow: hidden;
            background-color: #111;
        }
        .logo-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        h1 {
            color: #ff2a2a;
            font-size: 35px;
            letter-spacing: 2px;
            margin: 5px 0 0 0;
            text-transform: uppercase;
        }
        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 25px;
            margin-top: 30px;
        }
        .wallet-box {
            background-color: #161616;
            border: 1px solid #333;
            border-radius: 12px;
            padding: 15px 25px;
            width: 80%;
            max-width: 380px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.5);
        }
        .wallet-title {
            font-size: 16px;
            color: #aaa;
        }
        .wallet-amount {
            font-size: 22px;
            font-weight: bold;
            color: #ffcc00; 
        }
        .bonus-box {
            background-color: #161616;
            border: 1px solid #333;
            border-radius: 12px;
            padding: 20px;
            width: 90%;
            max-width: 400px;
        }
        .match-card {
            background-color: #161616;
            border: 1px solid #ff2a2a;
            border-radius: 12px;
            width: 90%;
            max-width: 400px;
            overflow: hidden;
            box-shadow: 0px 5px 15px rgba(0, 0, 0, 0.5);
        }
        .match-header {
            background: linear-gradient(135deg, #ff0000, #990000);
            padding: 10px;
            font-weight: bold;
            font-size: 18px;
        }
        .match-details {
            padding: 20px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            text-align: left;
            font-size: 15px;
        }
        .detail-item span {
            color: #ff2a2a;
            font-weight: bold;
        }
        .match-footer {
            padding: 15px;
        }
        .btn {
            background: linear-gradient(135deg, #ff0000, #990000);
            color: white;
            border: none;
            padding: 12px 28px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            width: 100%;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
        .btn:hover {
            transform: scale(1.03);
        }
        .btn-bonus {
            width: auto;
            min-width: 140px;
        }
    </style>
</head>
<body>

    <!-- 🔐 SCREEN 1: LOGIN PAGE -->
    <div id="login-screen">
        <div class="login-box">
            <h2 style="color: #ff2a2a; margin-top: 0;">ARENA LOGIN</h2>
            <p style="color: #aaa; font-size: 14px;">Enter your details to enter the arena</p>
            
            <input type="text" id="username" placeholder="Username (Koi bhi naam)">
            <input type="password" id="password" placeholder="Password (arena123)">
            
            <button class="btn" style="margin-top: 15px;" onclick="checkLogin()">ENTER ARENA</button>
        </div>
    </div>

    <!-- 🎮 SCREEN 2: MAIN WEBSITE -->
    <div id="main-site">
        <div class="header">
            <div class="logo-box">
                <img src="logo.jpg" alt="Arena Logo" id="logo-img">
            </div>
            <h1>Arena E-Sports</h1>
            <p>Free Fire Tournament Hub</p>
        </div>

        <div class="container">
            <div class="wallet-box">
                <span class="wallet-title">💰 Your Balance:</span>
                <span class="wallet-amount" id="coin-balance">0 Coins</span>
            </div>

            <div class="bonus-box">
                <h3>🎁 Daily Login Bonus</h3>
                <p>Claim your 1 Free Coin today!</p>
                <button class="btn btn-bonus" id="bonus-btn" onclick="claimCoin()">CLAIM NOW</button>
            </div>

            <div class="match-card">
                <div class="match-header">🔥 MATCH #01 - BERMUDA (SOLO)</div>
                <div class="match-details">
                    <div class="detail-item">🏆 Prize Pool: <span>₹500</span></div>
                    <div class="detail-item">💀 Per Kill: <span>₹5</span></div>
                    <div class="detail-item">💰 Entry Fee: <span>10 Coins</span></div>
                    <div class="detail-item">⏰ Time: <span>08:00 PM</span></div>
                </div>
                <div class="match-footer">
                    <button class="btn" onclick="joinMatch()">JOIN TOURNAMENT</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- ⚙️ SHURU MEIN CHECK KARO KYA USER PEHLE SE LOGGED IN HAI? ---
        window.onload = function() {
            let userIsLoggedIn = localStorage.getItem('isLoggedIn');
            let savedUsername = localStorage.getItem('username');

            if (userIsLoggedIn === 'true' && savedUsername) {
                // Agar logged in hai, toh login skip karo aur seedha site dikhao
                document.getElementById("login-screen").style.display = "none";
                document.getElementById("main-site").style.display = "block";
                updateBonusTimer();
            } else {
                // Agar logged in nahi hai, toh login form dikhao
                document.getElementById("login-screen").style.display = "flex";
            }
        };

        // --- 🔒 LOGIN LOGIC ---
        function checkLogin() {
            let userInput = document.getElementById("username").value;
            let passInput = document.getElementById("password").value;

            if (userInput.trim() !== "" && passInput === "arena123") {
                // Login status browser me save karo
                localStorage.setItem('isLoggedIn', 'true');
                localStorage.setItem('username', userInput);

                document.getElementById("login-screen").style.display = "none";
                document.getElementById("main-site").style.display = "block";
                alert("Welcome to the Arena, " + userInput + "! 🎮🔥");
                updateBonusTimer();
            } else {
                alert("Galat Password bhai! Sahi password daalo. (Hint: arena123) ❌");
            }
        }

        // --- 💰 WALLET & 24H TIMER LOGIC ---
        let currentBalance = parseInt(localStorage.getItem('walletBalance')) || 0;
        document.getElementById("coin-balance").innerText = currentBalance + " Coins";

        setInterval(updateBonusTimer, 1000);

        function claimCoin() {
            let lastClaimed = localStorage.getItem('lastClaimedTime');
            let currentTime = new Date().getTime();
            let dayInMilliseconds = 24 * 60 * 60 * 1000;

            if (!lastClaimed || (currentTime - lastClaimed >= dayInMilliseconds)) {
                currentBalance += 1;
                localStorage.setItem('walletBalance', currentBalance);
                localStorage.setItem('lastClaimedTime', currentTime);
                document.getElementById("coin-balance").innerText = currentBalance + " Coins";
                alert("Bhai, 1 Coin aapke wallet mein add ho gaya hai! 😎🔥");
                updateBonusTimer();
            }
        }

        function updateBonusTimer() {
            let lastClaimed = localStorage.getItem('lastClaimedTime');
            const btn = document.getElementById("bonus-btn");
            
            if (!lastClaimed) {
                btn.innerText = "CLAIM NOW";
                btn.disabled = false;
                btn.style.background = "linear-gradient(135deg, #ff0000, #990000)";
                return;
            }

            let currentTime = new Date().getTime();
            let dayInMilliseconds = 24 * 60 * 60 * 1000;
            let timePassed = currentTime - lastClaimed;
            
            if (timePassed < dayInMilliseconds) {
                let timeLeft = dayInMilliseconds - timePassed;
                let hours = Math.floor(timeLeft / (1000 * 60 * 60));
                let minutes = Math.floor((timeLeft % (1000 * 60 * 60)) / (1000 * 60));
                let seconds = Math.floor((timeLeft % (1000 * 60)) / 1000);
                
                btn.innerText = `${hours}h ${minutes}m ${seconds}s`;
                btn.disabled = true;
                btn.style.background = "#333";
            } else {
                btn.innerText = "CLAIM NOW";
                btn.disabled = false;
                btn.style.background = "linear-gradient(135deg, #ff0000, #990000)";
            }
        }

        function joinMatch() {
            if(currentBalance >= 10) {
                currentBalance -= 10;
                localStorage.setItem('walletBalance', currentBalance);
                document.getElementById("coin-balance").innerText = currentBalance + " Coins";
                alert("Match Joined Successfully! 👍🎮");
            } else {
                alert("Bhai, entry fees 10 Coins hai. Aapke paas coins kam hain! ❌");
            }
        }
    </script>

</body>
</html>
